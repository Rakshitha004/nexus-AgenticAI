global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: nexus-k8s

rule_files:
  - "/etc/prometheus/rules/*.yml"

# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#             - alertmanager:9093

scrape_configs:

  # ── Prometheus self ────────────────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  # ── Local monitoring VM containers ────────────────────────────────────────
  - job_name: cadvisor-local
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          env: local

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          env: local

  # ── Remote K8s node  (185.197.251.236) ────────────────────────────────────
  # cAdvisor running on the K8s node — container CPU/memory/network/disk metrics
  - job_name: cadvisor-remote
    metrics_path: /metrics
    static_configs:
      - targets: ["185.197.251.236:8080"]
        labels:
          env: production
          vm: k8s-node

  # Grafana Alloy running on the K8s node — agent health + log pipeline metrics
  - job_name: alloy-k8s
    metrics_path: /metrics
    static_configs:
      - targets: ["185.197.251.236:12345"]
        labels:
          env: production
          vm: k8s-node

  # ── Nexus K8s microservices ────────────────────────────────────────────────
  # Fill in the NodePort values once you run:
  #   kubectl get nodes -o wide       → K8S_NODE_IP
  #   kubectl get svc -n default      → NodePort numbers (e.g. 80:31234/TCP)

  # - job_name: sql-validator
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ["185.197.251.236:<SQL_VALIDATOR_NODEPORT>"]
  #       labels:
  #         service: sql-validator
  #         namespace: default
  #         env: production

  # - job_name: pushgateway
  #   honor_labels: true
  #   static_configs:
  #     - targets: ["pushgateway:9091"]
